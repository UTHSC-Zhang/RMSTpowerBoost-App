name: Upload coverage reports to Codecov

on:
  push:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Codecov token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -z "$CODECOV_TOKEN" ]; then
            echo "CODECOV_TOKEN is empty or missing in GitHub Secrets."
            exit 1
          fi

      - name: Ensure offline coverage report exists
        run: |
          pwd
          ls -la
          if [ ! -f coverage.xml ]; then
            echo "coverage.xml not found."
            echo "Generate it locally with: Rscript scripts/generate_coverage.R"
            exit 1
          fi
          wc -c coverage.xml

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          verbose: true
          disable_search: true
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
